<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            background: rgb(255, 215, 234);
            justify-content: center;
            align-items: center;
            background: rosybrown;
            font-family:Verdana, Geneva, Tahoma, sans-serif; 
            color: aliceblue;  
        }
        .card{
            background: rgb(212, 117, 117);
            padding: 20px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);

        }
        .imgperfil{
            width: 290px;
            height: 290px;
            border-radius: 50%;
            border: 5px solid rgba(90, 76, 76, 0.8);
            margin-bottom: 12px;
            object-fit: fill;

        }
        h2{
            margin: 10px 0 5px;
            font-size: 30px;
        }
        .local{
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10x;
        }
        .job{
            font-size: 10px;
            line-height: 1.5;
        
        }
        .botoes{
            margin: 20px 0; 
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn{
            padding: 10px 18px;
            border-radius: 6px;
            border: 1px solid rgb(255, 255, 254);
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover{
            opacity: 0.8;
            background: rgb(93, 75, 172);

        }
        .skills{
            margin-top: 20px;
            text-align: left;
        }
        .skills h3{
            font-size: 20px;
            margin-bottom: 10px;
        }
        .tags{
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag{
            border: 1px solid rgb(16, 61, 100);
            padding: 5px 10px;
            border-radius: 4px;
        }
        .social-media{
            margin-top: 20px;
            display: flex;
            justify-content:center;
            gap: 15px;
            font-size: 20px;
        }
        .social-media i{
            cursor: pointer;
            transition: 0.3s;
        }
        .social-media i:hover{
            color: rgb(172, 126, 141);
            transform: scale(1.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="alice.jpg" alt="Foto de perfil" class="imgperfil">
        <h2>Alice Oliveira Gomes</h2>
        <div class="local">Montes Claros - MG</div>
        <div class="job">Estágio/Estudante<br>Serviço Social/Técnico de Informatica</div><br>

        <div class="botões">
            <button class="primario">Mensagem</button>
            <button class="secundario">Follow</button>
        </div>
        <div class="skills">
            <h3>Habilidades</h3>
        <div class="tags">
            <span class="tag">Hardware</span><br>
            <span class="tag">HTML</span><br>
            <span class="tag">CSS</span><br>
            <span class="tag">PYTHON</span><br>
            <span class="tag">Redes</span><br>
            <span class="tag">Programação</span><br>
            <span class="tag">Inglês</span><br>
            <span class="tag">Analise de Dados</span><br><br>   
        </div>
        </div>
        <div class="social-media">
            <i class="fab fa-facebook"></i>
            <i class="fab fa-github"></i>
            <i class="fab fa-linkedin"></i>
            <i class="fab fa-instagram"></i>
        </div>
    </div>
    
</body>
</html>
